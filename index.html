<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CodeSphere PH</title>

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeSphere PH">
  <meta name="application-name" content="CodeSphere PH">
  <meta name="theme-color" content="#0b1a4d">
  <meta name="description" content="CodeSphere PH — point of sale and business management web app.">
  <meta name="msapplication-TileImage" content="icon-192.png">
  <meta name="msapplication-TileColor" content="#0b1a4d">
  <meta name="msapplication-tap-highlight" content="no">
  <meta property="og:title"       content="CodeSphere PH">
  <meta property="og:description" content="Point of sale and business management web app.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="icon-512.png">
  <meta name="twitter:card"       content="summary">
  <link rel="manifest" href="manifest.json">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#05070f;width:100vw;height:100vh;overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;}

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;transition:opacity .6s ease;
      background:
        radial-gradient(700px 480px at 82% -8%, rgba(70,130,255,.28), transparent 60%),
        radial-gradient(620px 460px at -10% 110%, rgba(245,176,38,.16), transparent 60%),
        radial-gradient(circle at 50% 42%, #0c1430 0%, #05070f 72%);}

    /* golden rings spiralling around the logo */
    .logo-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;
      animation:cardIn .6s cubic-bezier(.2,.9,.3,1.3) both;}
    @keyframes cardIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
    .logo-wrap img{width:120px;height:120px;border-radius:50%;position:relative;z-index:2;
      box-shadow:0 0 34px rgba(70,130,255,.5);}
    .ring{position:absolute;border-radius:50%;border:3px solid transparent;}
    .r1{width:200px;height:200px;border-top-color:#ffd76a;border-right-color:#ffd76a;
      animation:spin 1.5s linear infinite;filter:drop-shadow(0 0 6px rgba(255,215,106,.7));}
    .r2{width:158px;height:158px;border-bottom-color:#f5b026;border-left-color:#f5b026;
      animation:spin 2.1s linear infinite reverse;filter:drop-shadow(0 0 5px rgba(245,176,38,.6));}
    .r3{width:118px;height:118px;border-top-color:#b9860f;border-left-color:#b9860f;
      animation:spin 1.1s linear infinite;filter:drop-shadow(0 0 4px rgba(185,134,15,.6));}
    @keyframes spin{to{transform:rotate(360deg)}}

    .app-name{margin-top:30px;font-weight:800;font-size:28px;letter-spacing:.2px;color:#eaf2ff;}
    .app-name .b{color:#34d0e8;}
    .app-sub{color:#9fb6d6;font-size:11px;font-weight:700;margin-top:8px;letter-spacing:3px;text-transform:uppercase;}

    #loadbarWrap{margin-top:30px;width:184px;height:7px;border-radius:7px;background:rgba(255,255,255,.12);overflow:hidden;}
    #loadbarWrap i{display:block;height:100%;width:42%;border-radius:7px;
      background:linear-gradient(90deg,#f5b026,#ffd76a);animation:slide 1.2s ease-in-out infinite;}
    @keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(320%)}}

    #openBtn{display:none;margin-top:24px;background:#1226a3;color:#fff;border:none;border-radius:100px;
      padding:13px 26px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 #0b1a4d;text-decoration:none;}
    #splash .hint{display:none;color:rgba(159,182,214,.7);font-size:11px;margin-top:12px;}

    #app-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;background:#05070f;}

    #installBanner{display:none;position:fixed;bottom:20px;left:12px;right:12px;z-index:998;
      background:#0c1430;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.12);padding:14px 16px;align-items:center;gap:12px;}
    #installBanner img{width:44px;height:44px;border-radius:12px;flex-shrink:0;}
    #installBanner .ib-text{flex:1;min-width:0;}
    #installBanner .ib-title{font-weight:800;font-size:14px;color:#eaf2ff;}
    #installBanner .ib-sub{font-size:12px;color:#9fb6d6;margin-top:2px;}
    #installBanner .ib-install{background:#1226a3;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    #installBanner .ib-close{background:none;border:none;color:#9fb6d6;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;}
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       APP URL — CodeSphere PH deployed Apps Script Web App (/exec).
       For the app to load INSIDE the frame, your Apps Script doGet must use:
         .setXFrameOptionsMode(HtmlService.XFrameOptionsMode.ALLOWALL)
       then redeploy as a New version. Otherwise use the "Open the App" button.
       ═══════════════════════════════════════════════════════════════ -->
  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbyjibp50oWYeapnuQaZCDAvenmUCJp--i-EC33CmwPDwAaP1w-3ACkKa7IsHb80kghePQ/exec";
  </script>

  <div id="splash">
    <div class="logo-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <img src="icon.png" alt="CodeSphere PH">
    </div>

    <div class="app-name">Code<span class="b">Sphere</span> PH</div>
    <div class="app-sub">Operations Management System</div>

    <div id="loadbarWrap"><i></i></div>

    <a id="openBtn" href="#" target="_blank" rel="noopener">Open the App  &rarr;</a>
    <div class="hint" id="openHint">Taking a while? Tap the button above.</div>
  </div>

  <iframe id="app-frame" allow="fullscreen; clipboard-write; camera; microphone" allowfullscreen></iframe>

  <div id="installBanner">
    <img src="icon-192.png" alt="CodeSphere PH">
    <div class="ib-text">
      <div class="ib-title">Add to Home Screen</div>
      <div class="ib-sub">Install CodeSphere PH for quick access</div>
    </div>
    <button class="ib-install" onclick="triggerInstall()">Install</button>
    <button class="ib-close"   onclick="dismissInstall()">✕</button>
  </div>

  <script>
    var splash=document.getElementById('splash'), frame=document.getElementById('app-frame'),
        openBtn=document.getElementById('openBtn'), openHint=document.getElementById('openHint');
    function hideSplash(){ splash.style.opacity='0'; setTimeout(function(){ splash.style.display='none'; },600); }

    frame.src = APP_URL; openBtn.href = APP_URL;
    frame.onload = function(){ setTimeout(hideSplash, 800); };
    setTimeout(hideSplash, 6000);
    setTimeout(function(){ openBtn.style.display='inline-block'; openHint.style.display='block'; }, 4500);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW failed',e);}); });
    }
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; document.getElementById('installBanner').style.display='flex'; });
    window.addEventListener('appinstalled', function(){ document.getElementById('installBanner').style.display='none'; deferredPrompt=null; });
    function triggerInstall(){ if(!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    function dismissInstall(){ document.getElementById('installBanner').style.display='none'; }
  </script>
</body>
</html>
